<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMFlow - Gestão de Melhorias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <h1>🏭 SIMFlow</h1>
            <ul>
                <li class="active" data-page="dashboard">📊 Dashboard</li>
                <li data-page="etiquetas">🏷️ Etiquetas</li>
                <li data-page="ga">👥 GA</li>
                <li data-page="melhorias">📈 Ver & Agir</li>
                <li data-page="acidentes">⚠️ Quase Acidentes</li>
            </ul>
        </nav>
        
        <!-- Conteúdo Principal -->
        <main class="content">
            <header>
                <h2 id="page-title">Dashboard</h2>
                <button id="btn-novo" class="btn-primary">+ Novo</button>
            </header>
            
            <section id="page-content">
                <!-- Conteúdo dinâmico -->
            </section>
        </main>
    </div>
    
    <!-- ============================================ -->
    <!-- MODAL - ETIQUETA -->
    <!-- ============================================ -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2>Nova Etiqueta</h2>
            <form id="form-etiqueta">
                <input type="text" id="etiqueta-titulo" placeholder="Título" required>
                <textarea id="etiqueta-descricao" placeholder="Descrição" required></textarea>
                <select id="etiqueta-tipo" required>
                    <option value="">Tipo</option>
                    <option value="Azul">Azul - Operador resolve</option>
                    <option value="Vermelha">Vermelha - Manutenção</option>
                </select>
                <select id="etiqueta-linha">
                    <option value="TREPKO">TREPKO</option>
                    <option value="SERAC">SERAC</option>
                </select>
                <input type="text" id="etiqueta-responsavel" placeholder="Responsável">
                <input type="text" id="etiqueta-via" placeholder="Via (Controle/Manutenção)">
                <textarea id="etiqueta-observacoes" placeholder="Observações"></textarea>
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- MODAL - GA (Grupo Autônomo) -->
    <!-- ============================================ -->
    <div id="modal-ga" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModalGA()">&times;</span>
            <h2>Nova Reunião GA</h2>
            <form id="form-ga">
                <input type="hidden" id="ga-id">
                <input type="date" id="ga-data" required>
                <input type="text" id="ga-pauta" placeholder="Pauta da Reunião" required>
                <input type="text" id="ga-participantes" placeholder="Participantes (separados por vírgula)">
                <textarea id="ga-decisoes" placeholder="Decisões tomadas" rows="3"></textarea>
                <input type="number" id="ga-acoes" placeholder="Número de ações geradas" min="0">
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- MODAL - MELHORIA (Ver & Agir / LUP'S) -->
    <!-- ============================================ -->
    <div id="modal-melhoria" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModalMelhoria()">&times;</span>
            <h2>Nova Melhoria</h2>
            <form id="form-melhoria">
                <input type="hidden" id="melhoria-id">
                <input type="text" id="melhoria-titulo" placeholder="Título" required>
                <textarea id="melhoria-descricao" placeholder="Descrição" required rows="3"></textarea>
                <select id="melhoria-categoria" required>
                    <option value="Ver & Agir">Ver & Agir</option>
                    <option value="LUP">LUP - Lição de Um Ponto</option>
                </select>
                <input type="text" id="melhoria-imagem-antes" placeholder="URL imagem ANTES (opcional)">
                <input type="text" id="melhoria-imagem-depois" placeholder="URL imagem DEPOIS (opcional)">
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- MODAL - QUASE ACIDENTE -->
    <!-- ============================================ -->
    <div id="modal-acidente" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModalAcidente()">&times;</span>
            <h2>Registrar Quase Acidente</h2>
            <form id="form-acidente">
                <input type="hidden" id="acidente-id">
                <textarea id="acidente-descricao" placeholder="Descrição do ocorrido" required rows="3"></textarea>
                <input type="text" id="acidente-local" placeholder="Local" required>
                <input type="text" id="acidente-responsavel" placeholder="Responsável pelo registro" required>
                <select id="acidente-status">
                    <option value="Reportado">Reportado</option>
                    <option value="Em Análise">Em Análise</option>
                    <option value="Resolvido">Resolvido</option>
                </select>
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/etiquetas.js"></script>
    <script src="js/ga.js"></script>
    <script src="js/melhorias.js"></script>
    <script src="js/acidentes.js"></script>
</body>
</html>
