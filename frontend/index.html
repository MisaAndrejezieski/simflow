<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMFlow - Gestão de Melhorias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <h1>🏭 SIMFlow</h1>
            <ul>
                <li class="active" data-page="dashboard">📊 Dashboard</li>
                <li data-page="etiquetas">🏷️ Etiquetas</li>
                <li data-page="ga">👥 GA</li>
                <li data-page="melhorias">📈 Ver & Agir</li>
                <li data-page="acidentes">⚠️ Quase Acidentes</li>
            </ul>
        </nav>
        
        <!-- Conteúdo Principal -->
        <main class="content">
            <header>
                <h2 id="page-title">Dashboard</h2>
                <button id="btn-novo" class="btn-primary">+ Novo</button>
            </header>
            
            <section id="page-content">
                <!-- Cards Dashboard -->
                <div class="dashboard-cards">
                    <div class="card">
                        <h3>Etiquetas Abertas</h3>
                        <p class="number" id="total-abertas">0</p>
                    </div>
                    <div class="card">
                        <h3>Vermelhas</h3>
                        <p class="number" id="total-vermelhas">0</p>
                    </div>
                    <div class="card">
                        <h3>Azuis</h3>
                        <p class="number" id="total-azuis">0</p>
                    </div>
                    <div class="card">
                        <h3>Próxima Reunião GA</h3>
                        <p id="proxima-reuniao">--/--/----</p>
                    </div>
                </div>
                
                <!-- Lista de Etiquetas Recentes -->
                <div class="table-container">
                    <h3>Últimas Etiquetas</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Tipo</th>
                                <th>Status</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-etiquetas">
                            <!-- Preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Modal para criar nova etiqueta -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Nova Etiqueta</h2>
            <form id="form-etiqueta">
                <input type="text" id="titulo" placeholder="Título" required>
                <textarea id="descricao" placeholder="Descrição" required></textarea>
                <select id="tipo" required>
                    <option value="">Tipo</option>
                    <option value="Azul">Azul - Operador resolve</option>
                    <option value="Vermelha">Vermelha - Manutenção</option>
                </select>
                <select id="linha">
                    <option value="TREPKO">TREPKO</option>
                    <option value="SERAC">SERAC</option>
                </select>
                <input type="text" id="responsavel" placeholder="Responsável">
                <input type="text" id="via" placeholder="Via (Controle/Manutenção)">
                <textarea id="observacoes" placeholder="Observações"></textarea>
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/etiquetas.js"></script>
</body>
</html>
