<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; height: 100vh; background: #0F0E17; color: #fff; }
        
        .sidebar { width: 200px; background: #1A1932; padding: 20px; border-right: 1px solid #333; }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; color: #6C63FF; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 12px 16px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; }
        .sidebar ul li:hover { background: #2A2A4A; }
        .sidebar ul li.active { background: #6C63FF; }
        .sidebar ul li .badge { float: right; background: #FF6B6B; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .content-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #6C63FF; color: #fff; }
        .btn-primary:hover { background: #5A52D5; }
        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 4px; }
        .btn-danger { background: #FF6B6B; color: #fff; }
        .btn-success { background: #00C9A7; color: #fff; }
        
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
        .card { background: #1A1932; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .card .value { font-size: 32px; font-weight: bold; color: #6C63FF; }
        .card .label { color: #888; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; background: #1A1932; border-radius: 12px; overflow: hidden; }
        th { background: #2A2A4A; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .badge-azul { background: #4ECDC4; padding: 2px 12px; border-radius: 12px; font-size: 12px; }
        .badge-vermelha { background: #FF6B6B; padding: 2px 12px; border-radius: 12px; font-size: 12px; }
        .status-aberta { background: #FFB800; padding: 2px 12px; border-radius: 12px; font-size: 12px; color: #000; }
        .status-concluida { background: #00C9A7; padding: 2px 12px; border-radius: 12px; font-size: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: #1A1932; padding: 30px; border-radius: 12px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-close { float: right; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .modal-content h2 { margin-bottom: 20px; }
        .modal-content label { display: block; margin: 10px 0 5px; font-size: 14px; }
        .modal-content input, .modal-content select, .modal-content textarea { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; 
            background: #2A2A4A; color: #fff; font-size: 14px;
        }
        .modal-content textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        
        .grid-melhorias { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card-melhoria { background: #1A1932; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .card-melhoria h4 { margin-bottom: 8px; }
        .card-melhoria .desc { color: #888; font-size: 14px; }
        .card-melhoria .footer { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
        
        .empty { text-align: center; padding: 60px; color: #888; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px; }
            .sidebar ul { display: flex; overflow-x: auto; gap: 4px; }
            .sidebar ul li { white-space: nowrap; padding: 8px 12px; font-size: 13px; }
            .cards { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h1>🏭 SIMFlow</h1>
        <ul>
            <li class="active" onclick="pagina('dashboard')">📊 Dashboard</li>
            <li onclick="pagina('etiquetas')">🏷️ Etiquetas <span class="badge" id="badge-etiquetas">0</span></li>
            <li onclick="pagina('ga')">👥 GA</li>
            <li onclick="pagina('melhorias')">📈 Ver & Agir</li>
            <li onclick="pagina('acidentes')">⚠️ Quase Acidentes</li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
        <div class="content-header">
            <h2 id="titulo">📊 Dashboard</h2>
            <button class="btn btn-primary" id="btnNovo" onclick="abrirModal()">+ Novo</button>
        </div>
        <div id="conteudo"></div>
    </div>

    <!-- =================================================== -->
    <!-- MODAL ETIQUETA -->
    <!-- =================================================== -->
    <div class="modal" id="modal-etiqueta">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal('modal-etiqueta')">✕</button>
            <h2>📝 Nova Etiqueta</h2>
            <form onsubmit="salvarEtiqueta(event)">
                <input type="hidden" id="et-id">
                <label>Título</label>
                <input type="text" id="et-titulo" required>
                <label>Descrição</label>
                <textarea id="et-descricao" required></textarea>
                <div class="form-row">
                    <div>
                        <label>Tipo</label>
                        <select id="et-tipo">
                            <option value="Azul">🔵 Azul</option>
                            <option value="Vermelha">🔴 Vermelha</option>
                        </select>
                    </div>
                    <div>
                        <label>Linha</label>
                        <select id="et-linha">
                            <option value="TREPKO">TREPKO</option>
                            <option value="SERAC">SERAC</option>
                        </select>
                    </div>
                </div>
                <label>Responsável</label>
                <input type="text" id="et-responsavel">
                <div class="form-actions">
                    <button type="button" class="btn" style="background:#444;" onclick="fecharModal('modal-etiqueta')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- =================================================== -->
    <!-- MODAL GA -->
    <!-- =================================================== -->
    <div class="modal" id="modal-ga">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal('modal-ga')">✕</button>
            <h2>👥 Nova Reunião GA</h2>
            <form onsubmit="salvarGA(event)">
                <input type="hidden" id="ga-id">
                <label>Data</label>
                <input type="date" id="ga-data" required>
                <label>Pauta</label>
                <input type="text" id="ga-pauta" required>
                <label>Participantes</label>
                <input type="text" id="ga-participantes">
                <label>Decisões</label>
                <textarea id="ga-decisoes"></textarea>
                <label>Ações Geradas</label>
                <input type="number" id="ga-acoes" value="0">
                <div class="form-actions">
                    <button type="button" class="btn" style="background:#444;" onclick="fecharModal('modal-ga')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- =================================================== -->
    <!-- MODAL MELHORIA -->
    <!-- =================================================== -->
    <div class="modal" id="modal-melhoria">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal('modal-melhoria')">✕</button>
            <h2>📈 Nova Melhoria</h2>
            <form onsubmit="salvarMelhoria(event)">
                <input type="hidden" id="me-id">
                <label>Título</label>
                <input type="text" id="me-titulo" required>
                <label>Descrição</label>
                <textarea id="me-descricao" required></textarea>
                <label>Categoria</label>
                <select id="me-categoria">
                    <option value="Ver & Agir">Ver & Agir</option>
                    <option value="LUP">LUP</option>
                </select>
                <div class="form-actions">
                    <button type="button" class="btn" style="background:#444;" onclick="fecharModal('modal-melhoria')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- =================================================== -->
    <!-- MODAL ACIDENTE -->
    <!-- =================================================== -->
    <div class="modal" id="modal-acidente">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal('modal-acidente')">✕</button>
            <h2>⚠️ Registrar Quase Acidente</h2>
            <form onsubmit="salvarAcidente(event)">
                <input type="hidden" id="ac-id">
                <label>Descrição</label>
                <textarea id="ac-descricao" required></textarea>
                <div class="form-row">
                    <div>
                        <label>Local</label>
                        <input type="text" id="ac-local" required>
                    </div>
                    <div>
                        <label>Responsável</label>
                        <input type="text" id="ac-responsavel" required>
                    </div>
                </div>
                <label>Status</label>
                <select id="ac-status">
                    <option value="Reportado">Reportado</option>
                    <option value="Em Análise">Em Análise</option>
                    <option value="Resolvido">Resolvido</option>
                </select>
                <div class="form-actions">
                    <button type="button" class="btn" style="background:#444;" onclick="fecharModal('modal-acidente')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- =================================================== -->
    <!-- SCRIPT PRINCIPAL -->
    <!-- =================================================== -->
    <script>
        console.log('🚀 SIMFlow iniciado!');

        // ================================================
        // DADOS
        // ================================================
        let etiquetas = [];
        let etId = 1;
        let gaLista = [];
        let gaId = 1;
        let melhoriasLista = [];
        let meId = 1;
        let acidentesLista = [];
        let acId = 1;
        let paginaAtual = 'dashboard';

        // ================================================
        // NAVEGAÇÃO
        // ================================================
        function pagina(pagina) {
            console.log('📄 Navegando para:', pagina);
            paginaAtual = pagina;

            // Menu
            document.querySelectorAll('.sidebar ul li').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.sidebar ul li');
            const idx = ['dashboard','etiquetas','ga','melhorias','acidentes'].indexOf(pagina);
            if (items[idx]) items[idx].classList.add('active');

            // Título
            const titulos = {
                'dashboard': '📊 Dashboard',
                'etiquetas': '🏷️ Etiquetas',
                'ga': '👥 GA',
                'melhorias': '📈 Ver & Agir',
                'acidentes': '⚠️ Quase Acidentes'
            };
            document.getElementById('titulo').textContent = titulos[pagina] || pagina;

            // Botão Novo
            document.getElementById('btnNovo').style.display = (pagina === 'dashboard') ? 'none' : 'inline-block';

            // Conteúdo
            switch(pagina) {
                case 'dashboard': renderDashboard(); break;
                case 'etiquetas': renderEtiquetas(); break;
                case 'ga': renderGA(); break;
                case 'melhorias': renderMelhorias(); break;
                case 'acidentes': renderAcidentes(); break;
            }
        }

        // ================================================
        // DASHBOARD
        // ================================================
        function renderDashboard() {
            const total = etiquetas.length;
            const abertas = etiquetas.filter(e => e.status !== 'Concluída').length;
            const vermelhas = etiquetas.filter(e => e.tipo === 'Vermelha' && e.status !== 'Concluída').length;
            const azuis = etiquetas.filter(e => e.tipo === 'Azul' && e.status !== 'Concluída').length;

            document.getElementById('badge-etiquetas').textContent = abertas;

            let html = `
                <div class="cards">
                    <div class="card"><div class="value">${total}</div><div class="label">Total Etiquetas</div></div>
                    <div class="card"><div class="value">${abertas}</div><div class="label">Em Aberto</div></div>
                    <div class="card"><div class="value">${vermelhas}</div><div class="label">Vermelhas</div></div>
                    <div class="card"><div class="value">${azuis}</div><div class="label">Azuis</div></div>
                </div>
                <h3 style="margin-bottom:12px;">📋 Últimas Etiquetas</h3>
                <table>
                    <thead><tr><th>ID</th><th>Título</th><th>Tipo</th><th>Status</th></tr></thead>
                    <tbody>
            `;

            const ultimas = [...etiquetas].reverse().slice(0,5);
            if (ultimas.length === 0) {
                html += `<tr><td colspan="4" style="text-align:center;color:#888;padding:30px;">Nenhuma etiqueta</td></tr>`;
            } else {
                ultimas.forEach(e => {
                    const tipoClass = e.tipo === 'Azul' ? 'badge-azul' : 'badge-vermelha';
                    const statusClass = e.status === 'Concluída' ? 'status-concluida' : 'status-aberta';
                    html += `<tr><td>#${e.id}</td><td>${e.titulo}</td><td><span class="${tipoClass}">${e.tipo}</span></td><td><span class="${statusClass}">${e.status}</span></td></tr>`;
                });
            }

            html += `</tbody></table>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        // ================================================
        // ETIQUETAS
        // ================================================
        function renderEtiquetas() {
            let html = `
                <table>
                    <thead><tr><th>ID</th><th>Título</th><th>Descrição</th><th>Tipo</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody>
            `;

            if (etiquetas.length === 0) {
                html += `<tr><td colspan="6" style="text-align:center;color:#888;padding:30px;">Nenhuma etiqueta</td></tr>`;
            } else {
                etiquetas.forEach(e => {
                    const tipoClass = e.tipo === 'Azul' ? 'badge-azul' : 'badge-vermelha';
                    const statusClass = e.status === 'Concluída' ? 'status-concluida' : 'status-aberta';
                    html += `
                        <tr>
                            <td>#${e.id}</td>
                            <td><b>${e.titulo}</b></td>
                            <td>${e.descricao.substring(0,40)}${e.descricao.length > 40 ? '...' : ''}</td>
                            <td><span class="${tipoClass}">${e.tipo}</span></td>
                            <td><span class="${statusClass}">${e.status}</span></td>
                            <td>
                                ${e.status !== 'Concluída' ? `
                                    <button class="btn btn-sm btn-primary" onclick="atualizarEtiqueta(${e.id}, 'Em Análise')">Analisar</button>
                                    <button class="btn btn-sm btn-success" onclick="atualizarEtiqueta(${e.id}, 'Concluída')">Concluir</button>
                                ` : ''}
                                <button class="btn btn-sm btn-danger" onclick="deletarEtiqueta(${e.id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        function salvarEtiqueta(e) {
            e.preventDefault();
            const id = document.getElementById('et-id').value;
            const hoje = new Date().toLocaleDateString('pt-BR');
            const dados = {
                titulo: document.getElementById('et-titulo').value,
                descricao: document.getElementById('et-descricao').value,
                tipo: document.getElementById('et-tipo').value,
                linha: document.getElementById('et-linha').value,
                responsavel: document.getElementById('et-responsavel').value
            };

            if (id) {
                const idx = etiquetas.findIndex(el => el.id === parseInt(id));
                if (idx !== -1) etiquetas[idx] = { ...etiquetas[idx], ...dados };
            } else {
                etiquetas.push({ id: etId++, ...dados, status: 'Aberta', data: hoje });
            }

            fecharModal('modal-etiqueta');
            pagina(paginaAtual);
        }

        function atualizarEtiqueta(id, status) {
            const el = etiquetas.find(e => e.id === id);
            if (el) { el.status = status; pagina(paginaAtual); }
        }

        function deletarEtiqueta(id) {
            if (confirm('Excluir?')) {
                etiquetas = etiquetas.filter(e => e.id !== id);
                pagina(paginaAtual);
            }
        }

        // ================================================
        // GA
        // ================================================
        function renderGA() {
            let html = `<table><thead><tr><th>ID</th><th>Data</th><th>Pauta</th><th>Ações</th></tr></thead><tbody>`;
            if (gaLista.length === 0) {
                html += `<tr><td colspan="4" style="text-align:center;color:#888;padding:30px;">Nenhuma reunião</td></tr>`;
            } else {
                gaLista.forEach(r => {
                    html += `<tr><td>#${r.id}</td><td>${r.data}</td><td>${r.pauta}</td><td><button class="btn btn-sm btn-danger" onclick="deletarGA(${r.id})">🗑️</button></td></tr>`;
                });
            }
            html += `</tbody></table>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        function salvarGA(e) {
            e.preventDefault();
            const id = document.getElementById('ga-id').value;
            const data = document.getElementById('ga-data').value;
            const dataFormatada = new Date(data+'T00:00:00').toLocaleDateString('pt-BR');
            const dados = {
                data: dataFormatada,
                pauta: document.getElementById('ga-pauta').value,
                participantes: document.getElementById('ga-participantes').value,
                decisoes: document.getElementById('ga-decisoes').value,
                acoes: parseInt(document.getElementById('ga-acoes').value) || 0
            };
            if (id) {
                const idx = gaLista.findIndex(r => r.id === parseInt(id));
                if (idx !== -1) gaLista[idx] = { ...gaLista[idx], ...dados };
            } else {
                gaLista.push({ id: gaId++, ...dados });
            }
            fecharModal('modal-ga');
            pagina(paginaAtual);
        }

        function deletarGA(id) {
            if (confirm('Excluir?')) { gaLista = gaLista.filter(r => r.id !== id); pagina(paginaAtual); }
        }

        // ================================================
        // MELHORIAS
        // ================================================
        function renderMelhorias() {
            let html = `<div class="grid-melhorias">`;
            if (melhoriasLista.length === 0) {
                html += `<div class="empty">Nenhuma melhoria</div>`;
            } else {
                melhoriasLista.forEach(m => {
                    html += `
                        <div class="card-melhoria">
                            <h4>${m.titulo}</h4>
                            <div class="desc">${m.descricao}</div>
                            <div class="footer">
                                <span style="color:#888;font-size:12px;">${m.categoria}</span>
                                <button class="btn btn-sm btn-danger" onclick="deletarMelhoria(${m.id})">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        function salvarMelhoria(e) {
            e.preventDefault();
            const id = document.getElementById('me-id').value;
            const dados = {
                titulo: document.getElementById('me-titulo').value,
                descricao: document.getElementById('me-descricao').value,
                categoria: document.getElementById('me-categoria').value,
                data: new Date().toLocaleDateString('pt-BR')
            };
            if (id) {
                const idx = melhoriasLista.findIndex(m => m.id === parseInt(id));
                if (idx !== -1) melhoriasLista[idx] = { ...melhoriasLista[idx], ...dados };
            } else {
                melhoriasLista.push({ id: meId++, ...dados });
            }
            fecharModal('modal-melhoria');
            pagina(paginaAtual);
        }

        function deletarMelhoria(id) {
            if (confirm('Excluir?')) { melhoriasLista = melhoriasLista.filter(m => m.id !== id); pagina(paginaAtual); }
        }

        // ================================================
        // ACIDENTES
        // ================================================
        function renderAcidentes() {
            let html = `<table><thead><tr><th>ID</th><th>Descrição</th><th>Local</th><th>Status</th><th>Ações</th></tr></thead><tbody>`;
            if (acidentesLista.length === 0) {
                html += `<tr><td colspan="5" style="text-align:center;color:#888;padding:30px;">Nenhum registro</td></tr>`;
            } else {
                acidentesLista.forEach(a => {
                    const statusClass = a.status === 'Resolvido' ? 'status-concluida' : 'status-aberta';
                    html += `
                        <tr>
                            <td>#${a.id}</td>
                            <td>${a.descricao}</td>
                            <td>${a.local}</td>
                            <td><span class="${statusClass}">${a.status}</span></td>
                            <td>
                                ${a.status !== 'Resolvido' ? `
                                    <button class="btn btn-sm btn-primary" onclick="atualizarAcidente(${a.id}, 'Em Análise')">Analisar</button>
                                    <button class="btn btn-sm btn-success" onclick="atualizarAcidente(${a.id}, 'Resolvido')">Resolver</button>
                                ` : ''}
                                <button class="btn btn-sm btn-danger" onclick="deletarAcidente(${a.id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            }
            html += `</tbody></table>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        function salvarAcidente(e) {
            e.preventDefault();
            const id = document.getElementById('ac-id').value;
            const dados = {
                descricao: document.getElementById('ac-descricao').value,
                local: document.getElementById('ac-local').value,
                responsavel: document.getElementById('ac-responsavel').value,
                status: document.getElementById('ac-status').value,
                data: new Date().toLocaleDateString('pt-BR')
            };
            if (id) {
                const idx = acidentesLista.findIndex(a => a.id === parseInt(id));
                if (idx !== -1) acidentesLista[idx] = { ...acidentesLista[idx], ...dados };
            } else {
                acidentesLista.push({ id: acId++, ...dados });
            }
            fecharModal('modal-acidente');
            pagina(paginaAtual);
        }

        function atualizarAcidente(id, status) {
            const el = acidentesLista.find(a => a.id === id);
            if (el) { el.status = status; pagina(paginaAtual); }
        }

        function deletarAcidente(id) {
            if (confirm('Excluir?')) { acidentesLista = acidentesLista.filter(a => a.id !== id); pagina(paginaAtual); }
        }

        // ================================================
        // MODAIS
        // ================================================
        function abrirModal() {
            switch(paginaAtual) {
                case 'etiquetas':
                    document.getElementById('modal-etiqueta').style.display = 'flex';
                    document.getElementById('modal-etiqueta').querySelector('form').reset();
                    document.getElementById('et-id').value = '';
                    break;
                case 'ga':
                    document.getElementById('modal-ga').style.display = 'flex';
                    document.getElementById('modal-ga').querySelector('form').reset();
                    document.getElementById('ga-id').value = '';
                    document.getElementById('ga-data').value = new Date().toISOString().split('T')[0];
                    break;
                case 'melhorias':
                    document.getElementById('modal-melhoria').style.display = 'flex';
                    document.getElementById('modal-melhoria').querySelector('form').reset();
                    document.getElementById('me-id').value = '';
                    break;
                case 'acidentes':
                    document.getElementById('modal-acidente').style.display = 'flex';
                    document.getElementById('modal-acidente').querySelector('form').reset();
                    document.getElementById('ac-id').value = '';
                    break;
            }
        }

        function fecharModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Fechar clicando fora
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        // Fechar com ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            }
        });

        // ================================================
        // INICIAR
        // ================================================
        pagina('dashboard');
        console.log('✅ SIMFlow pronto!');
    </script>

</body>
</html>
